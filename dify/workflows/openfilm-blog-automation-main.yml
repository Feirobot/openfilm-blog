    - data:
        code: "import json\nfrom datetime import datetime, timezone\n\n\ndef loads(text, default):\n    if not text:\n        return default\n    try:\n        return json.loads(text)\n    except Exception:\n        return default\n\n\ndef dumps(value):\n    return json.dumps(value, ensure_ascii=False)\n\n\ndef main(\n    task_state: str = '',\n    existing_posts: str = '',\n    editor_json: str = '',\n    translator_visual_json: str = '',\n    parse_error: str = '',\n    translation_parse_error: str = ''\n) -> dict:\n    state = loads(task_state, {})\n    editor = loads(editor_json, {})\n    translator = loads(translator_visual_json, {})\n    posts = loads(existing_posts, {})\n\n    steps = state.setdefault('steps', {})\n    steps['editor'] = 'done' if not parse_error else 'error'\n    steps['translator_visual'] = 'done' if not translation_parse_error else 'error'\n    steps['review_submit'] = 'pending'\n\n    state['status'] = 'translated' if not (parse_error or translation_parse_error)\
          \ else 'needs_attention'\n    state['current_agent'] = 'review_submit'\n    state['updated_at'] = datetime.now(timezone.utc).isoformat()\n\n    state['article'] = {\n        'selected_topic': editor.get('selected_topic', ''),\n        'slug': translator.get('slug') or editor.get('slug_suggestion', ''),\n        'zh_title': translator.get('zh_title') or editor.get('title', ''),\n        'en_title': translator.get('en_title', ''),\n        'zh_summary': translator.get('zh_summary') or editor.get('summary', ''),\n        'en_summary': translator.get('en_summary', ''),\n        'zh_markdown': translator.get('zh_markdown', ''),\n        'en_markdown': translator.get('en_markdown', ''),\n        'seo': translator.get('seo', {}),\n        'visual_brief': translator.get('visual_brief', {}),\n        'sources': editor.get('sources', []),\n        'risk_flags': translator.get('risk_flags') or editor.get('risk_flags', []),\n        'translation_notes': translator.get('translation_notes',\
          \ ''),\n    }\n\n    state['existing_posts'] = {\n        'source': posts.get('source', ''),\n        'count': posts.get('count', 0),\n    }\n\n    state['errors'] = {\n        'editor_parse_error': parse_error,\n        'translation_parse_error': translation_parse_error,\n    }\n\n    return {'task_state': dumps(state)}\n"

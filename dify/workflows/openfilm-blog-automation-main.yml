          \        'selected_topic': str(data.get('selected_topic', '')),\n        'title': str(data.get('title', '')),\n        'slug_suggestion': str(data.get('slug_suggestion', '')),\n        'summary': str(data.get('summary', '')),\n        'article_markdown': str(data.get('article_markdown') or data.get('article_markmarkdown') or data.get('article_markment') or data.get('markdown') or ''),\n        'sources_json': dumps(data.get('sources', [])),\n        'risk_flags_json': dumps(data.get('risk_flags', [])),\n        'editor_notes': str(data.get('editor_notes', '')),\n        'parse_error': parse_error\n    }\n"

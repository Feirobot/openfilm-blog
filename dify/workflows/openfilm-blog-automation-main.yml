          \    'src/content/posts/film-scanning-complete-guide-zh.mdx',\n    'src/content/posts/film-stock-guide-2026-zh.mdx',\n    'src/content/posts/film-street-photography-guide-zh.mdx',\n    'src/content/posts/home-film-developing-guide-zh.mdx',\n    'src/content/posts/infrared-film-photography-guide-zh.mdx',\n    'src/content/posts/live-photos-introduction-zh.mdx',\n    'src/content/posts/medium-format-film-photography-guide-zh.mdx',\n    'src/content/posts/qoderwake-linux-deployment-guide-zh.mdx',\n    'src/content/posts/summer-film-photography-guide-zh.mdx',\n    'src/content/posts/why-film-still-matters.md'\n]\n\n\ndef title_from_slug(slug: str) -> str:\n    return slug.replace('-zh', '').replace('-', ' ').strip()\n\n\ndef posts_from_paths(paths):\n    posts = []\n    for path in paths:\n        filename = path.rsplit('/', 1)[-1]\n        slug = re.sub(r'\\.(mdx|md)$', '', filename)\n        posts.append({'path': path, 'slug': slug, 'normalized_topic': title_from_slug(slug)})\n \
          \   return posts\n\n\ndef main(github_body='') -> dict:\n    if isinstance(github_body, dict):\n        data = github_body\n    else:\n        try:\n            data = json.loads(github_body or '{}')\n        except Exception:\n            data = {}\n\n    paths = []\n    for item in data.get('tree', []) if isinstance(data, dict) else []:\n        path = item.get('path', '')\n        if not path.startswith('src/content/posts/'):\n            continue\n        if path.endswith('-en.mdx'):\n            continue\n        if path.endswith('-zh.mdx') or path.endswith('.md'):\n            paths.append(path)\n\n    source = 'github_api'\n    if not paths:\n        paths = FALLBACK_PATHS\n        source = 'fallback_static_index'\n\n    posts = posts_from_paths(paths)\n    existing_index = {\n        'repo': 'Feirobot/openfilm-blog',\n        'content_dir': 'src/content/posts',\n        'source': source,\n        'count': len(posts),\n        'posts': posts,\n        'avoid_rule': '不要选择与\
          \ posts 中 slug 或 normalized_topic 高度相似的主题；如果必须相关，必须换成更窄、更具体的新角度。'\n    }\n    return {'existing_posts': json.dumps(existing_index, ensure_ascii=False)}\n"

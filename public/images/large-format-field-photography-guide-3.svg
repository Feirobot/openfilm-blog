<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="530" fill="#FAF8F5" rx="16"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-size="18" font-weight="600" fill="#37352F">The Zone System</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#9B9A97">Place any measured tone anywhere from pure black to pure white</text>

  <!-- Zone scale bar -->
  <g transform="translate(60, 90)">
    <!-- Zone rectangles -->
    <rect x="0" y="0" width="68" height="60" rx="4" fill="#0D0D0D" stroke="#37352F" stroke-width="1"/>
    <rect x="68" y="0" width="68" height="60" rx="0" fill="#262626"/>
    <rect x="136" y="0" width="68" height="60" rx="0" fill="#404040"/>
    <rect x="204" y="0" width="68" height="60" rx="0" fill="#595959"/>
    <rect x="272" y="0" width="68" height="60" rx="0" fill="#737373"/>
    <rect x="340" y="0" width="68" height="60" rx="0" fill="#8C8C8C"/>
    <rect x="408" y="0" width="68" height="60" rx="0" fill="#A6A6A6"/>
    <rect x="476" y="0" width="68" height="60" rx="0" fill="#BFBFBF"/>
    <rect x="544" y="0" width="68" height="60" rx="0" fill="#D9D9D9"/>
    <rect x="612" y="0" width="68" height="60" rx="4" fill="#F2F2F2" stroke="#CCCCCC" stroke-width="1"/>

    <!-- Zone labels -->
    <text x="34" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#37352F">0</text>
    <text x="102" y="80" text-anchor="middle" font-size="11" fill="#37352F">I</text>
    <text x="170" y="80" text-anchor="middle" font-size="11" fill="#37352F">II</text>
    <text x="238" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#E03E3E">III</text>
    <text x="306" y="80" text-anchor="middle" font-size="11" fill="#37352F">IV</text>
    <text x="374" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#2D9BF0">V</text>
    <text x="442" y="80" text-anchor="middle" font-size="11" fill="#37352F">VI</text>
    <text x="510" y="80" text-anchor="middle" font-size="11" fill="#37352F">VII</text>
    <text x="578" y="80" text-anchor="middle" font-size="11" fill="#37352F">VIII</text>
    <text x="646" y="80" text-anchor="middle" font-size="11" fill="#37352F">IX</text>

    <!-- Zone descriptions -->
    <text x="34" y="96" text-anchor="middle" font-size="8" fill="#9B9A97">black</text>
    <text x="238" y="96" text-anchor="middle" font-size="8" fill="#E03E3E">detail</text>
    <text x="374" y="96" text-anchor="middle" font-size="8" fill="#2D9BF0">18% gray</text>
    <text x="646" y="96" text-anchor="middle" font-size="8" fill="#9B9A97">white</text>

    <!-- Zone III callout -->
    <line x1="170" y1="-8" x2="170" y2="-30" stroke="#E03E3E" stroke-width="1.5"/>
    <text x="170" y="-36" text-anchor="middle" font-size="10" fill="#E03E3E" font-weight="500">shadow rock placed here</text>

    <!-- Zone V callout -->
    <line x1="374" y1="-8" x2="374" y2="-20" stroke="#2D9BF0" stroke-width="1.5"/>
    <text x="374" y="-26" text-anchor="middle" font-size="9" fill="#2D9BF0">meter reads this</text>
  </g>

  <!-- Spot meter illustration -->
  <g transform="translate(60, 230)">
    <rect width="320" height="150" rx="10" fill="#FFFFFF" stroke="#E8E4DE" stroke-width="1.5"/>
    <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#37352F">Field Metering</text>

    <!-- Spot meter body -->
    <g transform="translate(30, 40)">
      <rect x="0" y="0" width="70" height="35" rx="6" fill="#37352F"/>
      <circle cx="70" cy="17" r="14" fill="#4A4A46" stroke="#37352F" stroke-width="1.5"/>
      <circle cx="70" cy="17" r="6" fill="#2F3437"/>
      <circle cx="70" cy="17" r="2" fill="#E03E3E" opacity="0.6"/>
      <!-- Viewfinder -->
      <rect x="10" y="6" width="20" height="12" rx="2" fill="#4A4A46"/>
      <text x="35" y="55" text-anchor="middle" font-size="9" fill="#9B9A97">spot meter</text>
    </g>

    <!-- Three readings -->
    <g transform="translate(140, 40)">
      <circle cx="10" cy="10" r="8" fill="#404040"/>
      <text x="26" y="14" font-size="10" fill="#37352F">rock in shadow → f/8</text>

      <circle cx="10" cy="38" r="8" fill="#A6A6A6"/>
      <text x="26" y="42" font-size="10" fill="#37352F">sunlit grass → f/16</text>

      <circle cx="10" cy="66" r="8" fill="#E8E4DE" stroke="#CCC" stroke-width="1"/>
      <text x="26" y="70" font-size="10" fill="#37352F">clouds → f/32</text>
    </g>

    <text x="160" y="135" text-anchor="middle" font-size="9" fill="#6B6A67">Meter each area independently, then decide placement</text>
  </g>

  <!-- Development control -->
  <g transform="translate(420, 230)">
    <rect width="320" height="150" rx="10" fill="#FFFFFF" stroke="#E8E4DE" stroke-width="1.5"/>
    <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#37352F">Development Control</text>

    <!-- Normal vs N- comparison -->
    <g transform="translate(20, 40)">
      <!-- Normal development -->
      <rect x="0" y="0" width="120" height="80" rx="6" fill="#F5F3EF" stroke="#E8E4DE" stroke-width="1"/>
      <text x="60" y="16" text-anchor="middle" font-size="10" font-weight="500" fill="#37352F">Normal (N)</text>
      <!-- Density bar -->
      <rect x="15" y="25" width="90" height="12" rx="2" fill="#D4CFC7"/>
      <rect x="15" y="25" width="90" height="12" rx="2" fill="url(#normalGrad)"/>
      <text x="60" y="52" text-anchor="middle" font-size="9" fill="#6B6A67">8-stop range</text>
      <text x="60" y="68" text-anchor="middle" font-size="9" fill="#9B9A97">for normal scenes</text>

      <!-- N- development -->
      <rect x="150" y="0" width="120" height="80" rx="6" fill="#FFF9E6" stroke="#F0E6C0" stroke-width="1"/>
      <text x="210" y="16" text-anchor="middle" font-size="10" font-weight="500" fill="#E03E3E">Reduced (N-)</text>
      <rect x="165" y="25" width="90" height="12" rx="2" fill="#D4CFC7"/>
      <rect x="165" y="25" width="70" height="12" rx="2" fill="url(#reducedGrad)"/>
      <text x="210" y="52" text-anchor="middle" font-size="9" fill="#6B6A67">compressed highlights</text>
      <text x="210" y="68" text-anchor="middle" font-size="9" fill="#9B9A97">for high-contrast scenes</text>
    </g>

    <text x="160" y="138" text-anchor="middle" font-size="9" fill="#6B6A67">Each sheet gets its own development plan</text>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="normalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#D9D9D9"/>
    </linearGradient>
    <linearGradient id="reducedGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#B0B0B0"/>
    </linearGradient>
  </defs>

  <!-- Core advantage box -->
  <g transform="translate(60, 400)">
    <rect width="680" height="100" rx="10" fill="#FFF9E6" stroke="#F0E6C0" stroke-width="1.5"/>
    <text x="340" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#37352F">Core Advantage</text>
    <text x="340" y="52" text-anchor="middle" font-size="11" fill="#37352F">The meter tells you how to render any area as 18% gray.</text>
    <text x="340" y="72" text-anchor="middle" font-size="11" fill="#37352F">You decide whether that tone becomes near-black or near-white.</text>
    <text x="340" y="92" text-anchor="middle" font-size="11" font-weight="500" fill="#E03E3E">Every sheet of film — independently exposed, independently developed.</text>
  </g>
</svg>
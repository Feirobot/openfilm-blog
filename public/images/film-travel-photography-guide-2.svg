<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#FAF8F5"/>
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#2D2D2D">Airport Security: Protecting Your Film</text>
  <!-- Conveyor belt -->
  <rect x="200" y="350" width="800" height="20" rx="10" fill="#D4D0C8"/>
  <rect x="180" y="340" width="40" height="40" rx="4" fill="#B8B0A4"/>
  <rect x="980" y="340" width="40" height="40" rx="4" fill="#B8B0A4"/>
  <!-- Scanner machine -->
  <rect x="450" y="180" width="300" height="170" rx="12" fill="#E0E4E8"/>
  <rect x="470" y="200" width="260" height="100" rx="8" fill="#C8D0D8"/>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui" font-size="16" fill="#6B7B8B">X-RAY SCANNER</text>
  <!-- Clear bag with film -->
  <rect x="310" y="260" width="100" height="80" rx="8" fill="#E8F0F8" stroke="#A0B8D0" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="325" y="275" width="25" height="50" rx="5" fill="#F5C542"/>
  <rect x="355" y="275" width="25" height="50" rx="5" fill="#C4A0D4"/>
  <rect x="385" y="275" width="15" height="50" rx="5" fill="#4A4A4A"/>
  <text x="360" y="250" text-anchor="middle" font-family="system-ui" font-size="11" fill="#5A7A9A">Film in clear bag</text>
  <!-- Hand check - GOOD -->
  <rect x="80" y="420" width="200" height="130" rx="12" fill="#E8F5E8" stroke="#7BC47B" stroke-width="2"/>
  <circle cx="180" cy="465" r="22" fill="#7BC47B"/>
  <path d="M168 465 L176 473 L194 455" stroke="#FFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="510" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#3A7A3A">Hand Check</text>
  <text x="180" y="530" text-anchor="middle" font-family="system-ui" font-size="11" fill="#5A9A5A">Request at security</text>
  <!-- Checked luggage - BAD -->
  <rect x="920" y="420" width="200" height="130" rx="12" fill="#FDE8E8" stroke="#D47B7B" stroke-width="2"/>
  <circle cx="1020" cy="465" r="22" fill="#D47B7B"/>
  <path d="M1008 453 L1032 477 M1032 453 L1008 477" stroke="#FFF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="1020" y="510" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#9A3A3A">Checked Luggage</text>
  <text x="1020" y="530" text-anchor="middle" font-family="system-ui" font-size="11" fill="#B05A5A">Never put film here</text>
  <!-- Arrows -->
  <path d="M180 420 L180 390 L360 350" stroke="#7BC47B" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M1020 420 L1020 390 L750 350" stroke="#D47B7B" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#7BC47B"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#D47B7B"/></marker>
  </defs>
  <!-- Radiation symbol -->
  <circle cx="600" y="140" r="18" fill="none" stroke="#E8A040" stroke-width="2"/>
  <text x="600" y="146" text-anchor="middle" font-family="system-ui" font-size="18" fill="#E8A040">&#x2622;</text>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui" font-size="11" fill="#C08030">Cumulative damage</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 896 512" width="896" height="512">
  <defs>
    <style>
      text { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="896" height="512" rx="16" fill="#FAF7F2"/>
  <!-- Title -->
  <text x="448" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#2D2A26">Reflective vs Incident Metering</text>
  <!-- Divider -->
  <line x1="448" y1="72" x2="448" y2="480" stroke="#E0DCD6" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Left: Reflective -->
  <text x="224" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#5B7FA5">Reflective Metering</text>
  <!-- Camera body -->
  <rect x="60" y="200" width="100" height="70" rx="10" fill="#5B7FA5" opacity="0.85"/>
  <rect x="80" y="185" width="40" height="20" rx="4" fill="#5B7FA5" opacity="0.65"/>
  <circle cx="110" cy="235" r="22" fill="#FAF7F2" stroke="#5B7FA5" stroke-width="3"/>
  <circle cx="110" cy="235" r="12" fill="#5B7FA5" opacity="0.3"/>
  <!-- Subject (person silhouette) -->
  <circle cx="340" cy="195" r="20" fill="#D4A574" opacity="0.7"/>
  <rect x="315" y="218" width="50" height="70" rx="12" fill="#D4A574" opacity="0.5"/>
  <!-- Reflected light rays (subject → camera) -->
  <line x1="310" y1="240" x2="170" y2="230" stroke="#F0C27A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="310" y1="255" x2="170" y2="245" stroke="#F0C27A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <line x1="310" y1="270" x2="170" y2="260" stroke="#F0C27A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Arrow heads -->
  <polygon points="175,228 165,232 175,236" fill="#F0C27A"/>
  <polygon points="175,243 165,247 175,251" fill="#F0C27A"/>
  <polygon points="175,258 165,262 175,266" fill="#F0C27A"/>
  <!-- Label -->
  <text x="230" y="330" text-anchor="middle" font-size="13" fill="#5B7FA5">Measures light</text>
  <text x="230" y="350" text-anchor="middle" font-size="13" fill="#5B7FA5">bouncing off subject</text>
  <!-- 18% gray assumption -->
  <rect x="154" y="370" width="150" height="36" rx="8" fill="#5B7FA5" opacity="0.1"/>
  <text x="229" y="393" text-anchor="middle" font-size="12" fill="#5B7FA5">Assumes 18% gray</text>
  <!-- Affected by subject color -->
  <rect x="154" y="416" width="150" height="36" rx="8" fill="#E8937A" opacity="0.15"/>
  <text x="229" y="439" text-anchor="middle" font-size="12" fill="#C96B50">Affected by subject tone</text>
  <!-- Right: Incident -->
  <text x="672" y="96" text-anchor="middle" font-size="16" font-weight="600" fill="#C96B50">Incident Metering</text>
  <!-- Handheld meter body -->
  <rect x="620" y="195" width="55" height="90" rx="8" fill="#C96B50" opacity="0.85"/>
  <!-- White dome -->
  <ellipse cx="647" cy="195" rx="28" ry="18" fill="#F5F0EB" stroke="#C96B50" stroke-width="2.5"/>
  <!-- Meter display -->
  <rect x="632" y="225" width="30" height="18" rx="3" fill="#FAF7F2" opacity="0.8"/>
  <text x="647" y="239" text-anchor="middle" font-size="10" fill="#C96B50">EV</text>
  <!-- Light source (sun) -->
  <circle cx="800" cy="160" r="24" fill="#F0C27A" opacity="0.8"/>
  <line x1="800" y1="125" x2="800" y2="115" stroke="#F0C27A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="825" y1="135" x2="832" y2="128" stroke="#F0C27A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="835" y1="160" x2="845" y2="160" stroke="#F0C27A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="825" y1="185" x2="832" y2="192" stroke="#F0C27A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Incident light rays (sun → dome) -->
  <line x1="776" y1="170" x2="680" y2="192" stroke="#F0C27A" stroke-width="2.5"/>
  <line x1="780" y1="185" x2="680" y2="200" stroke="#F0C27A" stroke-width="2.5"/>
  <line x1="770" y1="155" x2="680" y2="185" stroke="#F0C27A" stroke-width="2.5"/>
  <!-- Arrow heads -->
  <polygon points="685,190 675,194 685,198" fill="#F0C27A"/>
  <polygon points="685,198 675,202 685,206" fill="#F0C27A"/>
  <polygon points="685,183 675,187 685,191" fill="#F0C27A"/>
  <!-- Subject next to meter -->
  <circle cx="570" cy="210" r="18" fill="#D4A574" opacity="0.5"/>
  <rect x="548" y="232" width="44" height="58" rx="10" fill="#D4A574" opacity="0.35"/>
  <!-- Label -->
  <text x="672" y="330" text-anchor="middle" font-size="13" fill="#C96B50">Measures light</text>
  <text x="672" y="350" text-anchor="middle" font-size="13" fill="#C96B50">falling onto subject</text>
  <!-- Independent of subject color -->
  <rect x="597" y="370" width="150" height="36" rx="8" fill="#7BAF7B" opacity="0.15"/>
  <text x="672" y="393" text-anchor="middle" font-size="12" fill="#5A8F5A">Independent of tone</text>
  <!-- Best for backlight -->
  <rect x="597" y="416" width="150" height="36" rx="8" fill="#7BAF7B" opacity="0.15"/>
  <text x="672" y="439" text-anchor="middle" font-size="12" fill="#5A8F5A">Best for backlight</text>
</svg>
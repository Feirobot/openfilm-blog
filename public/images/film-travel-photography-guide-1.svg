<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#FAF8F5"/>
  <!-- Title area -->
  <text x="600" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#2D2D2D">Film Stock Selection for Travel</text>
  <!-- Camera body -->
  <rect x="480" y="180" width="240" height="160" rx="20" fill="#3D3D3D"/>
  <rect x="540" y="160" width="120" height="30" rx="8" fill="#4A4A4A"/>
  <circle cx="600" cy="260" r="55" fill="#2A2A2A" stroke="#5A5A5A" stroke-width="3"/>
  <circle cx="600" cy="260" r="35" fill="#1A1A1A"/>
  <circle cx="600" cy="260" r="15" fill="#3A3A6A" opacity="0.6"/>
  <!-- Film canister 1 - Kodak Gold -->
  <rect x="140" y="200" width="70" height="120" rx="10" fill="#F5C542"/>
  <rect x="145" y="210" width="60" height="30" rx="4" fill="#E8A825"/>
  <text x="175" y="230" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#FFF">GOLD</text>
  <text x="175" y="290" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#8B6914">ISO 200</text>
  <!-- Film canister 2 - Portra -->
  <rect x="260" y="200" width="70" height="120" rx="10" fill="#C4A0D4"/>
  <rect x="265" y="210" width="60" height="30" rx="4" fill="#A87DBF"/>
  <text x="300" y="230" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#FFF">PORTRA</text>
  <text x="300" y="290" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#6B4D7A">ISO 400</text>
  <!-- Film canister 3 - Tri-X -->
  <rect x="870" y="200" width="70" height="120" rx="10" fill="#4A4A4A"/>
  <rect x="875" y="210" width="60" height="30" rx="4" fill="#3A3A3A"/>
  <text x="910" y="230" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#FFF">TRI-X</text>
  <text x="910" y="290" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#888">ISO 400</text>
  <!-- Film canister 4 - Ultramax -->
  <rect x="990" y="200" width="70" height="120" rx="10" fill="#5B9BD5"/>
  <rect x="995" y="210" width="60" height="30" rx="4" fill="#4080C0"/>
  <text x="1030" y="225" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#FFF">ULTRA</text>
  <text x="1030" y="237" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#FFF">MAX</text>
  <text x="1030" y="290" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="500" fill="#2D6090">ISO 400</text>
  <!-- Notebook -->
  <rect x="160" y="400" width="120" height="150" rx="6" fill="#E8DDD0"/>
  <line x1="180" y1="430" x2="260" y2="430" stroke="#C4B8A8" stroke-width="1.5"/>
  <line x1="180" y1="450" x2="260" y2="450" stroke="#C4B8A8" stroke-width="1.5"/>
  <line x1="180" y1="470" x2="240" y2="470" stroke="#C4B8A8" stroke-width="1.5"/>
  <line x1="180" y1="490" x2="250" y2="490" stroke="#C4B8A8" stroke-width="1.5"/>
  <text x="220" y="420" text-anchor="middle" font-family="system-ui" font-size="11" fill="#8B7D6B">Shot Log</text>
  <!-- Passport -->
  <rect x="900" y="410" width="100" height="130" rx="6" fill="#2B4C7E"/>
  <circle cx="950" cy="465" r="20" fill="none" stroke="#C4A060" stroke-width="2"/>
  <text x="950" y="510" text-anchor="middle" font-family="system-ui" font-size="10" fill="#C4A060">PASSPORT</text>
  <!-- Connecting lines -->
  <line x1="210" y1="320" x2="480" y2="280" stroke="#D4C8B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="300" y1="320" x2="480" y2="260" stroke="#D4C8B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="720" y1="260" x2="870" y2="320" stroke="#D4C8B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="720" y1="280" x2="990" y2="320" stroke="#D4C8B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Bottom labels -->
  <text x="175" y="355" text-anchor="middle" font-family="system-ui" font-size="12" fill="#8B7D6B">Daylight</text>
  <text x="300" y="355" text-anchor="middle" font-family="system-ui" font-size="12" fill="#8B7D6B">Mixed Light</text>
  <text x="910" y="355" text-anchor="middle" font-family="system-ui" font-size="12" fill="#8B7D6B">Low Light</text>
  <text x="1030" y="355" text-anchor="middle" font-family="system-ui" font-size="12" fill="#8B7D6B">All-round</text>
</svg>

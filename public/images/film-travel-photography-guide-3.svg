<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <rect width="1200" height="600" fill="#FAF8F5"/>
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#2D2D2D">Film as a Travel Ritual</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8B7D6B">The beauty of delayed gratification</text>
  <!-- Timeline arrow -->
  <line x1="120" y1="300" x2="1080" y2="300" stroke="#D4C8B8" stroke-width="2"/>
  <polygon points="1080,295 1095,300 1080,305" fill="#D4C8B8"/>
  <!-- Step 1: Shooting -->
  <circle cx="220" cy="300" r="8" fill="#D4A050"/>
  <rect x="170" y="160" width="100" height="100" rx="12" fill="#FFF5E0" stroke="#D4A050" stroke-width="2"/>
  <!-- Camera icon -->
  <rect x="195" y="190" width="50" height="35" rx="6" fill="#3D3D3D"/>
  <circle cx="220" cy="207" r="10" fill="#2A2A2A" stroke="#5A5A5A" stroke-width="1.5"/>
  <rect x="205" y="183" width="30" height="10" rx="3" fill="#4A4A4A"/>
  <text x="220" y="280" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#8B6914">Shoot</text>
  <line x1="220" y1="260" x2="220" y2="292" stroke="#D4A050" stroke-width="1.5"/>
  <!-- Step 2: Waiting -->
  <circle cx="460" cy="300" r="8" fill="#A0A0C0"/>
  <rect x="410" y="160" width="100" height="100" rx="12" fill="#F0F0F8" stroke="#A0A0C0" stroke-width="2"/>
  <!-- Calendar icon -->
  <rect x="435" y="185" width="50" height="45" rx="4" fill="#E0E0F0" stroke="#8080A0" stroke-width="1.5"/>
  <line x1="435" y1="198" x2="485" y2="198" stroke="#8080A0" stroke-width="1.5"/>
  <text x="460" y="222" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="600" fill="#6060A0">...</text>
  <text x="460" y="280" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#5050A0">Wait</text>
  <line x1="460" y1="260" x2="460" y2="292" stroke="#A0A0C0" stroke-width="1.5"/>
  <!-- Step 3: Developing -->
  <circle cx="700" cy="300" r="8" fill="#70A0A0"/>
  <rect x="650" y="160" width="100" height="100" rx="12" fill="#E8F4F4" stroke="#70A0A0" stroke-width="2"/>
  <!-- Film strip icon -->
  <rect x="675" y="185" width="50" height="45" rx="3" fill="#2A2A2A"/>
  <rect x="680" y="190" width="12" height="9" rx="1" fill="#5A8A5A"/>
  <rect x="696" y="190" width="12" height="9" rx="1" fill="#8A7A5A"/>
  <rect x="712" y="190" width="8" height="9" rx="1" fill="#5A7A8A"/>
  <rect x="680" y="204" width="12" height="9" rx="1" fill="#8A6A5A"/>
  <rect x="696" y="204" width="12" height="9" rx="1" fill="#5A8A7A"/>
  <rect x="712" y="204" width="8" height="9" rx="1" fill="#7A7A5A"/>
  <text x="700" y="280" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#3A7A7A">Develop</text>
  <line x1="700" y1="260" x2="700" y2="292" stroke="#70A0A0" stroke-width="1.5"/>
  <!-- Step 4: Discovering -->
  <circle cx="940" cy="300" r="8" fill="#D07070"/>
  <rect x="890" y="160" width="100" height="100" rx="12" fill="#FDF0F0" stroke="#D07070" stroke-width="2"/>
  <!-- Screen icon -->
  <rect x="912" y="185" width="56" height="38" rx="4" fill="#E0E8F0" stroke="#8090A0" stroke-width="1.5"/>
  <rect x="932" y="223" width="16" height="8" rx="1" fill="#8090A0"/>
  <rect x="918" y="192" width="18" height="12" rx="1" fill="#C8A060" opacity="0.6"/>
  <rect x="940" y="192" width="22" height="12" rx="1" fill="#6090A0" opacity="0.6"/>
  <rect x="918" y="207" width="44" height="10" rx="1" fill="#A0C0A0" opacity="0.5"/>
  <text x="940" y="280" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="600" fill="#A03030">Discover</text>
  <line x1="940" y1="260" x2="940" y2="292" stroke="#D07070" stroke-width="1.5"/>
  <!-- Bottom quote -->
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#6B5D4D">"Film didn't just record the trip</text>
  <text x="600" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#6B5D4D">it was part of the trip itself."</text>
  <!-- Decorative elements -->
  <circle cx="150" cy="480" r="30" fill="#F5E8D0" opacity="0.5"/>
  <circle cx="1050" cy="480" r="25" fill="#D0E8F0" opacity="0.5"/>
  <circle cx="600" cy="500" r="20" fill="#E8D0E0" opacity="0.4"/>
</svg>
